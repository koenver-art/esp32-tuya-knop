<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" width="900" height="620">
  <metadata>
    <title>Systeem Schema — Woonkamer Lamp Controller v3.1</title>
    <creator>Koen Verhallen</creator>
    <date>2026</date>
  </metadata>

  <defs>
    <style>
      text { font-family: Consolas, monospace; }
      .title { font-size: 16px; font-weight: bold; fill: #222; }
      .subtitle { font-size: 11px; fill: #555; }
      .label { font-size: 11px; fill: #333; }
      .pin { font-size: 9px; fill: #0066aa; }
      .value { font-size: 10px; fill: #444; font-style: italic; }
      .note { font-size: 9px; fill: #777; }
      .wire-wifi { stroke: #2266aa; stroke-width: 1.5; fill: none; stroke-dasharray: 6,3; }
      .wire-ble { stroke: #7e57c2; stroke-width: 1.5; fill: none; stroke-dasharray: 4,4; }
      .wire-pwr { stroke: #cc0000; stroke-width: 1.5; fill: none; }
      .atom-fill { stroke: #333; stroke-width: 2; fill: #e8f0fa; }
      .bat-fill { stroke: #333; stroke-width: 2; fill: #f0ece8; }
      .lamp-fill { stroke: #dd8800; stroke-width: 1.5; fill: #fff8e0; }
      .phone-fill { stroke: #7e57c2; stroke-width: 1.5; fill: #f3e8ff; }
      .ha-fill { stroke: #00838f; stroke-width: 1.5; fill: #e0f7fa; }
      .border { stroke: #999; stroke-width: 1; fill: none; }
      .titleblock { stroke: #999; stroke-width: 0.5; fill: #fafafa; }
    </style>
  </defs>

  <!-- Border -->
  <rect x="5" y="5" width="890" height="610" class="border"/>

  <!-- Title block -->
  <rect x="560" y="545" width="330" height="65" class="titleblock"/>
  <line x1="560" y1="565" x2="890" y2="565" stroke="#999" stroke-width="0.5"/>
  <line x1="560" y1="585" x2="890" y2="585" stroke="#999" stroke-width="0.5"/>
  <line x1="720" y1="545" x2="720" y2="610" stroke="#999" stroke-width="0.5"/>
  <text x="575" y="559" class="label">Woonkamer Lamp Controller v3.1</text>
  <text x="575" y="579" class="subtitle">Systeem Schema</text>
  <text x="575" y="603" class="subtitle">Koen Verhallen — 2026</text>
  <text x="735" y="559" class="label">Versie: 3.1</text>
  <text x="735" y="579" class="subtitle">Blad: 1 / 1</text>
  <text x="735" y="603" class="subtitle">MIT Licentie</text>

  <!-- ==================== M5Stack Atom Lite ==================== -->
  <rect x="300" y="120" width="200" height="180" rx="8" class="atom-fill"/>
  <text x="400" y="148" text-anchor="middle" class="title" fill="#2266aa">M5Stack Atom Lite</text>
  <text x="400" y="165" text-anchor="middle" class="subtitle">ESP32-PICO-D4</text>
  <text x="400" y="180" text-anchor="middle" class="pin">WiFi + BLE 4.2</text>

  <!-- Ingebouwde knop -->
  <rect x="355" y="195" width="90" height="30" rx="4" fill="#dde4ee" stroke="#888" stroke-width="1"/>
  <text x="400" y="215" text-anchor="middle" class="label">Knop (G39)</text>
  <text x="400" y="228" text-anchor="middle" class="note">ext0 wakeup</text>

  <!-- RGB LED -->
  <circle cx="340" y="255" r="8" fill="#66aaff" stroke="#2266aa" stroke-width="1.5"/>
  <circle cx="340" y="255" r="12" fill="none" stroke="#2266aa" stroke-width="0.5" opacity="0.5"/>
  <text x="360" y="259" class="pin">RGB LED (G27)</text>
  <text x="360" y="270" class="note">SK6812 — kleur per lamp</text>

  <!-- Pin labels -->
  <text x="315" y="140" class="pin">24 × 24 mm</text>

  <!-- USB-C label -->
  <rect x="375" y="290" width="50" height="14" rx="2" fill="#555" stroke="#444" stroke-width="0.5"/>
  <text x="400" y="300" text-anchor="middle" font-size="7" fill="#fff" font-family="Consolas, monospace">USB-C</text>

  <!-- ==================== Atomic Battery Base ==================== -->
  <rect x="300" y="320" width="200" height="120" rx="8" class="bat-fill"/>
  <text x="400" y="348" text-anchor="middle" class="label" font-weight="bold">Atomic Battery Base</text>
  <text x="400" y="365" text-anchor="middle" class="subtitle">200mAh LiPo</text>

  <!-- Boost converter -->
  <rect x="320" y="375" width="80" height="22" rx="3" fill="#e8e0d8" stroke="#999" stroke-width="1"/>
  <text x="360" y="390" text-anchor="middle" class="note">ETA9085E boost</text>
  <text x="360" y="402" text-anchor="middle" class="note">3.7V → 5V</text>

  <!-- Switch -->
  <rect x="420" y="375" width="60" height="22" rx="3" fill="#e8e0d8" stroke="#999" stroke-width="1"/>
  <text x="450" y="390" text-anchor="middle" class="note">ON / OFF</text>

  <!-- Battery LEDs -->
  <circle cx="330" cy="420" r="3" fill="#cc0000"/>
  <circle cx="345" cy="420" r="3" fill="#cc0000"/>
  <circle cx="360" cy="420" r="3" fill="#cc0000"/>
  <circle cx="375" cy="420" r="3" fill="#cc0000"/>
  <text x="395" y="423" class="note">25% 50% 75% 100%</text>

  <!-- Charge LEDs -->
  <circle cx="330" cy="435" r="3" fill="#4488ff"/>
  <text x="345" y="438" class="note">laden</text>
  <circle cx="395" cy="435" r="3" fill="#44cc44"/>
  <text x="410" y="438" class="note">vol</text>

  <!-- Connection between Atom and Battery Base -->
  <line x1="400" y1="305" x2="400" y2="320" class="wire-pwr"/>
  <text x="415" y="315" class="pin" fill="#cc0000">5V via pin header</text>

  <!-- ==================== WiFi Lampen ==================== -->
  <text x="740" y="115" class="label" font-weight="bold">Woonkamer (WiFi LAN)</text>

  <!-- Lamp 1 -->
  <ellipse cx="660" cy="160" rx="20" ry="24" class="lamp-fill"/>
  <rect x="650" y="182" width="20" height="10" rx="2" stroke="#dd8800" stroke-width="1" fill="#ddd"/>
  <text x="660" y="165" text-anchor="middle" class="pin" fill="#dd8800">E27</text>
  <text x="660" y="208" text-anchor="middle" class="note">Hoofdlicht</text>

  <!-- Lamp 2 -->
  <ellipse cx="740" cy="160" rx="20" ry="24" class="lamp-fill"/>
  <rect x="730" y="182" width="20" height="10" rx="2" stroke="#dd8800" stroke-width="1" fill="#ddd"/>
  <text x="740" y="165" text-anchor="middle" class="pin" fill="#dd8800">E27</text>
  <text x="740" y="208" text-anchor="middle" class="note">Sfeerlamp</text>

  <!-- Lamp 3 -->
  <ellipse cx="820" cy="160" rx="20" ry="24" class="lamp-fill"/>
  <rect x="810" y="182" width="20" height="10" rx="2" stroke="#dd8800" stroke-width="1" fill="#ddd"/>
  <text x="820" y="165" text-anchor="middle" class="pin" fill="#dd8800">E27</text>
  <text x="820" y="208" text-anchor="middle" class="note">Leeslamp</text>

  <!-- WiFi connections to lamps -->
  <path d="M 500 180 C 540 170, 580 160, 640 160" class="wire-wifi"/>
  <path d="M 500 185 C 550 175, 600 165, 720 160" class="wire-wifi"/>
  <path d="M 500 190 C 560 180, 640 170, 800 160" class="wire-wifi"/>

  <text x="560" y="155" class="note" fill="#2266aa">Tuya LAN protocol</text>
  <text x="560" y="167" class="note" fill="#2266aa">TCP/AES-ECB (v3.3)</text>
  <text x="560" y="179" class="note" fill="#2266aa">TCP/AES-GCM (v3.5)</text>

  <!-- ==================== BLE Telefoon ==================== -->
  <rect x="620" y="300" width="140" height="80" rx="10" class="phone-fill"/>
  <text x="690" y="325" text-anchor="middle" class="label" fill="#7e57c2">Smartphone</text>
  <text x="690" y="342" text-anchor="middle" class="note">BLE GATT client</text>
  <text x="690" y="356" text-anchor="middle" class="note">nRF Connect / Siri</text>
  <text x="690" y="370" text-anchor="middle" class="note">Shortcuts / Web</text>

  <!-- BLE connection -->
  <path d="M 500 240 C 530 260, 570 290, 620 320" class="wire-ble"/>
  <text x="540" y="270" class="note" fill="#7e57c2">BLE GATT</text>
  <text x="540" y="282" class="note" fill="#7e57c2">5 characteristics</text>

  <!-- ==================== Aanwezigheid ==================== -->
  <rect x="620" y="410" width="140" height="60" rx="6" class="phone-fill"/>
  <text x="690" y="435" text-anchor="middle" class="label" fill="#7e57c2">Aanwezigheid</text>
  <text x="690" y="450" text-anchor="middle" class="note">Koen: AirPods UUID</text>
  <text x="690" y="462" text-anchor="middle" class="note">Lotte: telefoon MAC</text>

  <!-- BLE scan connection -->
  <path d="M 500 260 C 530 310, 560 380, 620 430" class="wire-ble"/>
  <text x="530" y="360" class="note" fill="#7e57c2">BLE scan burst</text>
  <text x="530" y="372" class="note" fill="#7e57c2">5s / 30s interval</text>

  <!-- ==================== Home Assistant ==================== -->
  <rect x="50" y="150" width="160" height="80" rx="8" class="ha-fill"/>
  <text x="130" y="178" text-anchor="middle" class="label" fill="#00838f">Home Assistant</text>
  <text x="130" y="195" text-anchor="middle" class="note">MQTT Broker</text>
  <text x="130" y="210" text-anchor="middle" class="note">status / cmd / LWT</text>
  <text x="130" y="222" text-anchor="middle" class="note">aanwezigheid / donker</text>

  <!-- MQTT connection -->
  <line x1="210" y1="190" x2="300" y2="190" class="wire-wifi"/>
  <text x="240" y="183" class="note" fill="#2266aa">MQTT</text>

  <!-- ==================== Webinterface ==================== -->
  <rect x="50" y="280" width="160" height="60" rx="8" fill="#e8ffe8" stroke="#44aa44" stroke-width="1.5"/>
  <text x="130" y="305" text-anchor="middle" class="label" fill="#2e7d32">Webinterface</text>
  <text x="130" y="320" text-anchor="middle" class="note">http://&lt;ip&gt;:8080</text>
  <text x="130" y="332" text-anchor="middle" class="note">scenes · timer · kleur</text>

  <!-- HTTP connection -->
  <line x1="210" y1="310" x2="300" y2="250" class="wire-wifi"/>
  <text x="240" y="270" class="note" fill="#2266aa">HTTP</text>

  <!-- ==================== Deep Sleep ==================== -->
  <rect x="50" y="390" width="160" height="70" rx="8" fill="#fff0f0" stroke="#cc4444" stroke-width="1.5"/>
  <text x="130" y="415" text-anchor="middle" class="label" fill="#cc4444">Deep Sleep</text>
  <text x="130" y="432" text-anchor="middle" class="note">Na 60s inactiviteit</text>
  <text x="130" y="444" text-anchor="middle" class="note">Na 5s "alles uit"</text>
  <text x="130" y="456" text-anchor="middle" class="note">Wake: knop G39 (ext0)</text>

  <!-- Sleep connection -->
  <line x1="210" y1="420" x2="300" y2="350" stroke="#cc4444" stroke-width="1" stroke-dasharray="3,3" fill="none"/>

  <!-- ==================== Legenda ==================== -->
  <rect x="20" y="530" width="400" height="50" rx="3" fill="#fafafa" stroke="#ccc" stroke-width="0.5"/>
  <text x="30" y="548" class="note" font-weight="bold">Legenda:</text>

  <line x1="90" y1="544" x2="120" y2="544" class="wire-wifi"/>
  <text x="125" y="548" class="note">WiFi (Tuya/MQTT/HTTP)</text>

  <line x1="90" y1="562" x2="120" y2="562" class="wire-ble"/>
  <text x="125" y="566" class="note">Bluetooth LE</text>

  <line x1="250" y1="544" x2="280" y2="544" class="wire-pwr"/>
  <text x="285" y="548" class="note">Voeding (5V)</text>

  <rect x="250" y="556" width="30" height="12" rx="2" fill="#e8f0fa" stroke="#333" stroke-width="1"/>
  <text x="285" y="566" class="note">Hardware module</text>

</svg>
