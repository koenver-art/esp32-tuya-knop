<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 750" width="1000" height="750">
  <metadata>
    <title>Mechanische Tekening — Woonkamer Lamp Controller Behuizing</title>
    <creator>Koen Verhallen</creator>
    <date>2026</date>
  </metadata>
  <defs>
    <style>
      text { font-family: Consolas, 'Courier New', monospace; }
      .title { font-size: 14px; font-weight: bold; fill: #222; }
      .subtitle { font-size: 10px; fill: #555; }
      .dim-text { font-size: 9px; fill: #cc0000; }
      .dim-line { stroke: #cc0000; stroke-width: 0.5; fill: none; }
      .dim-arrow { fill: #cc0000; stroke: none; }
      .outline { stroke: #222; stroke-width: 1.5; fill: none; }
      .outline-hidden { stroke: #222; stroke-width: 0.7; fill: none; stroke-dasharray: 6,3; }
      .outline-thin { stroke: #555; stroke-width: 0.5; fill: none; }
      .center { stroke: #0066aa; stroke-width: 0.3; fill: none; stroke-dasharray: 12,3,2,3; }
      .hatch { stroke: #888; stroke-width: 0.3; fill: none; }
      .note { font-size: 8px; fill: #555; }
      .label { font-size: 10px; fill: #333; }
      .section { font-size: 11px; fill: #222; font-weight: bold; }
      .border { stroke: #333; stroke-width: 1; fill: none; }
      .tb { stroke: #333; stroke-width: 0.5; fill: #fafafa; }
    </style>
    <marker id="arrowR" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <polygon points="0,0 6,2 0,4" class="dim-arrow"/>
    </marker>
    <marker id="arrowL" markerWidth="6" markerHeight="4" refX="0" refY="2" orient="auto">
      <polygon points="6,0 0,2 6,4" class="dim-arrow"/>
    </marker>
    <marker id="arrowU" markerWidth="4" markerHeight="6" refX="2" refY="0" orient="auto">
      <polygon points="0,6 2,0 4,6" class="dim-arrow"/>
    </marker>
    <marker id="arrowD" markerWidth="4" markerHeight="6" refX="2" refY="6" orient="auto">
      <polygon points="0,0 2,6 4,0" class="dim-arrow"/>
    </marker>
  </defs>

  <!-- Border -->
  <rect x="5" y="5" width="990" height="740" class="border"/>

  <!-- Title block -->
  <rect x="620" y="670" width="370" height="70" class="tb"/>
  <line x1="620" y1="690" x2="990" y2="690" stroke="#333" stroke-width="0.5"/>
  <line x1="620" y1="710" x2="990" y2="710" stroke="#333" stroke-width="0.5"/>
  <line x1="620" y1="730" x2="990" y2="730" stroke="#333" stroke-width="0.5"/>
  <line x1="800" y1="670" x2="800" y2="740" stroke="#333" stroke-width="0.5"/>
  <line x1="900" y1="690" x2="900" y2="740" stroke="#333" stroke-width="0.5"/>
  <text x="635" y="685" class="label">Woonkamer Lamp Controller — Behuizing</text>
  <text x="635" y="705" class="subtitle">Mechanische Tekening</text>
  <text x="635" y="725" class="subtitle">Koen Verhallen</text>
  <text x="635" y="738" class="note">MIT Licentie</text>
  <text x="815" y="705" class="subtitle">Schaal: 2:1</text>
  <text x="815" y="725" class="subtitle">Maten: mm</text>
  <text x="815" y="738" class="note">Tolerantie: ±0.5mm</text>
  <text x="915" y="705" class="subtitle">Versie: 1.0</text>
  <text x="915" y="725" class="subtitle">Datum: 2026</text>
  <text x="915" y="738" class="note">Blad 1/1</text>

  <!-- ==================== VOORAANZICHT (DEKSEL) ==================== -->
  <text x="195" y="40" text-anchor="middle" class="section">VOORAANZICHT (Deksel)</text>

  <g transform="translate(60, 55)">
    <!-- Buitenomtrek deksel 130 x 70 mm (schaal 2:1 = 260 x 140) -->
    <rect x="0" y="0" width="260" height="140" rx="12" class="outline"/>

    <!-- Middellijn horizontaal -->
    <line x1="-15" y1="70" x2="275" y2="70" class="center"/>
    <!-- Middellijn verticaal -->
    <line x1="130" y1="-15" x2="130" y2="155" class="center"/>

    <!-- Gat drukknop 16mm (schaal = 32px diameter) -->
    <circle cx="130" cy="55" r="16" class="outline"/>
    <line x1="122" y1="55" x2="138" y2="55" class="center"/>
    <line x1="130" y1="47" x2="130" y2="63" class="center"/>

    <!-- 3x LED gaten (5mm = 10px diameter) -->
    <circle cx="100" cy="100" r="5" class="outline"/>
    <circle cx="130" cy="100" r="5" class="outline"/>
    <circle cx="160" cy="100" r="5" class="outline"/>

    <!-- ── Maat: totale breedte 130mm ── -->
    <line x1="0" y1="-8" x2="0" y2="-20" class="dim-line"/>
    <line x1="260" y1="-8" x2="260" y2="-20" class="dim-line"/>
    <line x1="0" y1="-15" x2="260" y2="-15" class="dim-line" marker-start="url(#arrowL)" marker-end="url(#arrowR)"/>
    <text x="130" y="-18" text-anchor="middle" class="dim-text">130</text>

    <!-- ── Maat: totale hoogte 70mm ── -->
    <line x1="268" y1="0" x2="290" y2="0" class="dim-line"/>
    <line x1="268" y1="140" x2="290" y2="140" class="dim-line"/>
    <line x1="285" y1="0" x2="285" y2="140" class="dim-line" marker-start="url(#arrowU)" marker-end="url(#arrowD)"/>
    <text x="292" y="74" class="dim-text">70</text>

    <!-- ── Maat: knop midden vanaf boven 27.5mm (55px) ── -->
    <line x1="-8" y1="0" x2="-25" y2="0" class="dim-line"/>
    <line x1="-8" y1="55" x2="-25" y2="55" class="dim-line"/>
    <line x1="-20" y1="0" x2="-20" y2="55" class="dim-line" marker-start="url(#arrowU)" marker-end="url(#arrowD)"/>
    <text x="-35" y="31" class="dim-text">27.5</text>

    <!-- ── Maat: knop diameter 16mm ── -->
    <line x1="130" y1="55" x2="155" y2="35" class="dim-line"/>
    <text x="158" y="33" class="dim-text">Ø16</text>

    <!-- ── Maat: LED diameter 5mm ── -->
    <line x1="160" y1="100" x2="185" y2="90" class="dim-line"/>
    <text x="188" y="88" class="dim-text">3x Ø5</text>

    <!-- ── Maat: LED center afstand ── -->
    <line x1="100" y1="112" x2="100" y2="125" class="dim-line"/>
    <line x1="160" y1="112" x2="160" y2="125" class="dim-line"/>
    <line x1="100" y1="120" x2="160" y2="120" class="dim-line" marker-start="url(#arrowL)" marker-end="url(#arrowR)"/>
    <text x="130" y="132" text-anchor="middle" class="dim-text">30 (2x 15)</text>

    <!-- ── Maat: LED rij vanaf boven 50mm (100px) ── -->
    <line x1="268" y1="55" x2="310" y2="55" class="dim-line"/>
    <line x1="268" y1="100" x2="310" y2="100" class="dim-line"/>
    <line x1="305" y1="55" x2="305" y2="100" class="dim-line" marker-start="url(#arrowU)" marker-end="url(#arrowD)"/>
    <text x="312" y="81" class="dim-text">22.5</text>
  </g>

  <!-- ==================== ZIJAANZICHT (DOORSNEDE A-A) ==================== -->
  <text x="195" y="260" text-anchor="middle" class="section">ZIJAANZICHT (Doorsnede A-A)</text>

  <g transform="translate(60, 275)">
    <!-- Buitenomtrek zijkant 130 x 25mm (schaal 2:1 = 260 x 50) -->
    <rect x="0" y="0" width="260" height="50" rx="4" class="outline"/>

    <!-- Deksel lijn -->
    <line x1="0" y1="6" x2="260" y2="6" class="outline-thin"/>
    <text x="265" y="5" class="note">deksel</text>
    <text x="265" y="32" class="note">bodemplaat</text>

    <!-- Knop uitsteek -->
    <rect x="115" y="-6" width="30" height="10" rx="3" class="outline"/>
    <text x="130" y="-9" text-anchor="middle" class="dim-text">knop</text>

    <!-- PCB binnenkant (gestippeld) -->
    <line x1="20" y1="28" x2="240" y2="28" class="outline-hidden"/>
    <text x="130" y="24" text-anchor="middle" class="note">ESP32 PCB</text>

    <!-- Batterij (gestippeld) -->
    <rect x="160" y="14" width="72" height="30" rx="4" class="outline-hidden"/>
    <text x="196" y="33" text-anchor="middle" class="note">18650</text>

    <!-- USB opening rechtsonder -->
    <rect x="245" y="36" width="18" height="10" rx="1" class="outline"/>
    <text x="254" y="60" text-anchor="middle" class="dim-text">USB</text>

    <!-- ── Maat: totale diepte 25mm ── -->
    <line x1="-8" y1="0" x2="-25" y2="0" class="dim-line"/>
    <line x1="-8" y1="50" x2="-25" y2="50" class="dim-line"/>
    <line x1="-20" y1="0" x2="-20" y2="50" class="dim-line" marker-start="url(#arrowU)" marker-end="url(#arrowD)"/>
    <text x="-35" y="29" class="dim-text">25</text>

    <!-- ── Maat: deksel dikte 3mm (6px) ── -->
    <line x1="268" y1="0" x2="290" y2="0" class="dim-line"/>
    <line x1="268" y1="6" x2="290" y2="6" class="dim-line"/>
    <line x1="285" y1="0" x2="285" y2="6" class="dim-line" marker-start="url(#arrowU)" marker-end="url(#arrowD)"/>
    <text x="292" y="6" class="dim-text">3</text>

    <!-- ── Maat: breedte (zelfde als boven) ── -->
    <line x1="0" y1="58" x2="0" y2="68" class="dim-line"/>
    <line x1="260" y1="58" x2="260" y2="68" class="dim-line"/>
    <line x1="0" y1="65" x2="260" y2="65" class="dim-line" marker-start="url(#arrowL)" marker-end="url(#arrowR)"/>
    <text x="130" y="74" text-anchor="middle" class="dim-text">130</text>
  </g>

  <!-- ==================== BOVENAANZICHT (BODEMPLAAT) ==================== -->
  <text x="690" y="40" text-anchor="middle" class="section">BOVENAANZICHT (Bodemplaat binnenkant)</text>

  <g transform="translate(520, 55)">
    <!-- Buitenomtrek 130 x 70 (2:1 = 260 x 140) -->
    <rect x="0" y="0" width="260" height="140" rx="12" class="outline"/>

    <!-- Middellijn -->
    <line x1="130" y1="-10" x2="130" y2="150" class="center"/>
    <line x1="-10" y1="70" x2="270" y2="70" class="center"/>

    <!-- 4x PCB montage gaten M3 -->
    <circle cx="35" cy="30" r="3" class="outline"/>
    <line x1="32" y1="30" x2="38" y2="30" class="center"/>
    <line x1="35" y1="27" x2="35" y2="33" class="center"/>

    <circle cx="225" cy="30" r="3" class="outline"/>
    <line x1="222" y1="30" x2="228" y2="30" class="center"/>
    <line x1="225" y1="27" x2="225" y2="33" class="center"/>

    <circle cx="35" cy="110" r="3" class="outline"/>
    <line x1="32" y1="110" x2="38" y2="110" class="center"/>
    <line x1="35" y1="107" x2="35" y2="113" class="center"/>

    <circle cx="225" cy="110" r="3" class="outline"/>
    <line x1="222" y1="110" x2="228" y2="110" class="center"/>
    <line x1="225" y1="107" x2="225" y2="113" class="center"/>

    <!-- ESP32 board omtrek (gestippeld) 50x25mm = 100x50px -->
    <rect x="30" y="20" width="120" height="100" rx="3" class="outline-hidden"/>
    <text x="90" y="75" text-anchor="middle" class="note">ESP32</text>
    <text x="90" y="87" text-anchor="middle" class="note">DevKit V1</text>

    <!-- Batterijhouder (gestippeld) -->
    <rect x="170" y="30" width="72" height="80" rx="4" class="outline-hidden"/>
    <text x="206" y="75" text-anchor="middle" class="note">18650</text>
    <text x="206" y="87" text-anchor="middle" class="note">houder</text>

    <!-- TP4056 (gestippeld) -->
    <rect x="170" y="5" width="40" height="20" rx="2" class="outline-hidden"/>
    <text x="190" y="18" text-anchor="middle" class="note">TP4056</text>

    <!-- USB opening in wand -->
    <rect x="246" y="118" width="18" height="14" rx="1" fill="#eee" stroke="#222" stroke-width="1"/>
    <text x="255" y="128" text-anchor="middle" class="note" font-size="6">USB</text>

    <!-- 4x wandmontage gaten M4 in hoeken -->
    <circle cx="16" cy="16" r="5" fill="none" stroke="#888" stroke-width="0.8"/>
    <circle cx="16" cy="16" r="1.5" fill="#888"/>
    <circle cx="244" cy="16" r="5" fill="none" stroke="#888" stroke-width="0.8"/>
    <circle cx="244" cy="16" r="1.5" fill="#888"/>
    <circle cx="16" cy="124" r="5" fill="none" stroke="#888" stroke-width="0.8"/>
    <circle cx="16" cy="124" r="1.5" fill="#888"/>
    <circle cx="244" cy="124" r="5" fill="none" stroke="#888" stroke-width="0.8"/>
    <circle cx="244" cy="124" r="1.5" fill="#888"/>

    <!-- ── Maat: PCB montage afstanden ── -->
    <line x1="35" y1="148" x2="35" y2="162" class="dim-line"/>
    <line x1="225" y1="148" x2="225" y2="162" class="dim-line"/>
    <line x1="35" y1="158" x2="225" y2="158" class="dim-line" marker-start="url(#arrowL)" marker-end="url(#arrowR)"/>
    <text x="130" y="170" text-anchor="middle" class="dim-text">95 (PCB montage)</text>

    <line x1="268" y1="30" x2="290" y2="30" class="dim-line"/>
    <line x1="268" y1="110" x2="290" y2="110" class="dim-line"/>
    <line x1="285" y1="30" x2="285" y2="110" class="dim-line" marker-start="url(#arrowU)" marker-end="url(#arrowD)"/>
    <text x="292" y="74" class="dim-text">40</text>

    <!-- ── Maat: M3 label ── -->
    <text x="50" y="28" class="dim-text">M3</text>
    <text x="232" y="28" class="dim-text">M3</text>
    <text x="50" y="120" class="dim-text">M3</text>

    <!-- ── Maat: wandmontage M4 ── -->
    <text x="5" y="36" class="note">M4</text>
    <text x="237" y="36" class="note">M4</text>
  </g>

  <!-- ==================== DETAIL: USB OPENING ==================== -->
  <text x="690" y="300" text-anchor="middle" class="section">DETAIL: USB Opening (onderzijde)</text>

  <g transform="translate(600, 315)">
    <!-- Wand doorsnede -->
    <rect x="0" y="0" width="180" height="60" rx="2" class="outline"/>
    <!-- USB gat -->
    <rect x="72" y="15" width="36" height="16" rx="3" class="outline"/>
    <!-- Arcering rond gat -->
    <line x1="72" y1="15" x2="66" y2="9" class="hatch"/>
    <line x1="80" y1="15" x2="74" y2="9" class="hatch"/>
    <line x1="88" y1="15" x2="82" y2="9" class="hatch"/>
    <line x1="96" y1="15" x2="90" y2="9" class="hatch"/>
    <line x1="104" y1="15" x2="98" y2="9" class="hatch"/>
    <line x1="108" y1="15" x2="102" y2="9" class="hatch"/>

    <!-- Maatlijn USB opening breedte -->
    <line x1="72" y1="40" x2="72" y2="52" class="dim-line"/>
    <line x1="108" y1="40" x2="108" y2="52" class="dim-line"/>
    <line x1="72" y1="48" x2="108" y2="48" class="dim-line" marker-start="url(#arrowL)" marker-end="url(#arrowR)"/>
    <text x="90" y="58" text-anchor="middle" class="dim-text">18 (Micro-USB)</text>

    <!-- Maatlijn USB opening hoogte -->
    <line x1="115" y1="15" x2="130" y2="15" class="dim-line"/>
    <line x1="115" y1="31" x2="130" y2="31" class="dim-line"/>
    <line x1="125" y1="15" x2="125" y2="31" class="dim-line" marker-start="url(#arrowU)" marker-end="url(#arrowD)"/>
    <text x="135" y="26" class="dim-text">8</text>
  </g>

  <!-- ==================== MATERIAAL NOTITIES ==================== -->
  <text x="80" y="430" class="section">Materiaal &amp; specificaties</text>

  <text x="40" y="452" class="note">1. Behuizing: ABS kunststof, wanddikte 2mm, kleur mat wit (RAL 9003)</text>
  <text x="40" y="466" class="note">2. Deksel: ABS, schroefbevestiging (4x M2.5 zelftappend)</text>
  <text x="40" y="480" class="note">3. PCB montage: 4x M3 nylon afstandsbus, hoogte 8mm</text>
  <text x="40" y="494" class="note">4. Wandmontage: 4x M4 schroefgat met verzinkboor voor platkopschroef</text>
  <text x="40" y="508" class="note">5. Drukknop opening: Ø16mm, centraal geplaatst, 27.5mm vanaf bovenkant</text>
  <text x="40" y="522" class="note">6. LED openingen: 3x Ø5mm, hartafstand 15mm, rij op 50mm vanaf bovenkant</text>
  <text x="40" y="536" class="note">7. USB opening: 18x8mm rechthoekig, onderzijde, gecentreerd</text>
  <text x="40" y="550" class="note">8. Afwerking: licht gestructureerd oppervlak, afgeronde hoeken R6</text>

  <!-- ==================== STUKLIJST ==================== -->
  <text x="80" y="585" class="section">Stuklijst behuizing</text>

  <!-- Tabel header -->
  <rect x="40" y="592" width="400" height="16" fill="#e8e8e8" stroke="#999" stroke-width="0.5"/>
  <text x="55" y="603" class="note" font-weight="bold">Pos</text>
  <text x="90" y="603" class="note" font-weight="bold">Onderdeel</text>
  <text x="260" y="603" class="note" font-weight="bold">Materiaal</text>
  <text x="370" y="603" class="note" font-weight="bold">Aantal</text>

  <!-- Rijen -->
  <rect x="40" y="608" width="400" height="14" fill="none" stroke="#ddd" stroke-width="0.5"/>
  <text x="55" y="618" class="note">1</text>
  <text x="90" y="618" class="note">Bodemplaat</text>
  <text x="260" y="618" class="note">ABS wit</text>
  <text x="380" y="618" class="note">1</text>

  <rect x="40" y="622" width="400" height="14" fill="#f8f8f8" stroke="#ddd" stroke-width="0.5"/>
  <text x="55" y="632" class="note">2</text>
  <text x="90" y="632" class="note">Deksel (met gaten)</text>
  <text x="260" y="632" class="note">ABS wit</text>
  <text x="380" y="632" class="note">1</text>

  <rect x="40" y="636" width="400" height="14" fill="none" stroke="#ddd" stroke-width="0.5"/>
  <text x="55" y="646" class="note">3</text>
  <text x="90" y="646" class="note">Wandbeugel</text>
  <text x="260" y="646" class="note">ABS wit</text>
  <text x="380" y="646" class="note">1</text>

  <rect x="40" y="650" width="400" height="14" fill="#f8f8f8" stroke="#ddd" stroke-width="0.5"/>
  <text x="55" y="660" class="note">4</text>
  <text x="90" y="660" class="note">Dekselschroef M2.5x8</text>
  <text x="260" y="660" class="note">RVS</text>
  <text x="380" y="660" class="note">4</text>

  <rect x="40" y="664" width="400" height="14" fill="none" stroke="#ddd" stroke-width="0.5"/>
  <text x="55" y="674" class="note">5</text>
  <text x="90" y="674" class="note">Afstandsbus M3x8 nylon</text>
  <text x="260" y="674" class="note">Nylon</text>
  <text x="380" y="674" class="note">4</text>

  <rect x="40" y="678" width="400" height="14" fill="#f8f8f8" stroke="#ddd" stroke-width="0.5"/>
  <text x="55" y="688" class="note">6</text>
  <text x="90" y="688" class="note">Wandmontage schroef M4x30</text>
  <text x="260" y="688" class="note">Staal verz.</text>
  <text x="380" y="688" class="note">4</text>

  <rect x="40" y="692" width="400" height="14" fill="none" stroke="#ddd" stroke-width="0.5"/>
  <text x="55" y="702" class="note">7</text>
  <text x="90" y="702" class="note">Muurplug Ø6</text>
  <text x="260" y="702" class="note">Nylon</text>
  <text x="380" y="702" class="note">4</text>

</svg>
